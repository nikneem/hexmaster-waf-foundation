name: Build runner image

on:
  push:
    branches:
      - main
    paths:
      - 'infra/runner-image/**'
      - '.github/workflows/build-runner-image.yml'
  workflow_dispatch:
    inputs:
      acr_name:
        description: Name of the Azure Container Registry.
        required: true
        type: string
      image_tag:
        description: Image tag to apply.
        required: true
        default: latest
        type: string

concurrency:
  group: runner-image-build
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  IMAGE_REPOSITORY: github-actions-runner
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}

jobs:
  build-and-push:
    name: Build and push runner image
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9f9f200a6d2e13bc7a4b0 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR name
        id: acr
        shell: bash
        run: |
          ACR_NAME="${{ github.event.inputs.acr_name }}"
          if [ -z "$ACR_NAME" ]; then
            echo "::error::ACR name must be provided via workflow_dispatch input or set as a variable."
            echo "Tip: run this workflow manually and provide the ACR name."
            exit 1
          fi
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and push to ACR
        shell: bash
        run: |
          az acr build \
            --registry "${{ steps.acr.outputs.name }}" \
            --image "$IMAGE_REPOSITORY:$IMAGE_TAG" \
            --image "$IMAGE_REPOSITORY:${{ github.sha }}" \
            ./infra/runner-image

      - name: Write build summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Runner Image Build

          | Property | Value |
          | --- | --- |
          | **Registry** | `${{ steps.acr.outputs.name }}.azurecr.io` |
          | **Repository** | `${{ env.IMAGE_REPOSITORY }}` |
          | **Tags** | `${{ env.IMAGE_TAG }}`, `${{ github.sha }}` |
          | **Source** | `infra/runner-image/` |
          EOF
