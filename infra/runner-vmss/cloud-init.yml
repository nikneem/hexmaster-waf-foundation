#cloud-config
package_update: true
package_upgrade: false
packages:
  - ca-certificates
  - curl
  - docker.io
  - git
  - jq
  - libicu70
  - libssl3
  - unzip
  - zip

users:
  - default
  - name: runner
    groups:
      - docker
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL

write_files:
  - path: /opt/github-runner/start-runner.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      RUNNER_HOME="/home/runner/actions-runner"
      RUNNER_VERSION="__RUNNER_VERSION__"
      GITHUB_URL="__GITHUB_URL__"
      RUNNER_GROUP="__RUNNER_GROUP__"
      RUNNER_LABELS="__RUNNER_LABELS__"
      KEY_VAULT_URI="__KEY_VAULT_URI__"
      GITHUB_PAT_SECRET_NAME="__GITHUB_PAT_SECRET_NAME__"
      REGISTRATION_TOKEN_API_URL="__REGISTRATION_TOKEN_API_URL__"
      MANAGED_IDENTITY_CLIENT_ID="__MANAGED_IDENTITY_CLIENT_ID__"

      log() { echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] $*"; }

      log "Starting GitHub Actions runner bootstrap (version ${RUNNER_VERSION})"

      mkdir -p "$RUNNER_HOME"
      chown -R runner:runner "$RUNNER_HOME"

      if [ ! -f "$RUNNER_HOME/config.sh" ]; then
        log "Downloading runner binary v${RUNNER_VERSION}..."
        archive_name="actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"
        runner_url="https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/${archive_name}"
        su - runner -c "cd \"$RUNNER_HOME\" && curl -fsSL \"$runner_url\" -o \"$archive_name\" && tar xzf \"$archive_name\" && rm -f \"$archive_name\""
        log "Installing runner dependencies..."
        bash "$RUNNER_HOME/bin/installdependencies.sh"
      fi

      log "Requesting IMDS token for Key Vault (client_id=${MANAGED_IDENTITY_CLIENT_ID})..."
      token_response=$(curl -fsSL -H Metadata:true \
        "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://vault.azure.net&client_id=${MANAGED_IDENTITY_CLIENT_ID}")
      key_vault_token=$(echo "$token_response" | jq -r '.access_token')

      if [ -z "$key_vault_token" ] || [ "$key_vault_token" = "null" ]; then
        log "ERROR: Failed to obtain Key Vault access token from IMDS."
        log "Response: $token_response"
        exit 1
      fi
      log "Key Vault token acquired."

      log "Fetching GitHub PAT from Key Vault secret '${GITHUB_PAT_SECRET_NAME}'..."
      kv_response=$(curl -sSL -w "\n%{http_code}" -H "Authorization: Bearer ${key_vault_token}" \
        "${KEY_VAULT_URI}secrets/${GITHUB_PAT_SECRET_NAME}?api-version=7.4")
      kv_http_code=$(echo "$kv_response" | tail -1)
      kv_body=$(echo "$kv_response" | sed '$d')
      github_pat=$(echo "$kv_body" | jq -r '.value')

      if [ "$kv_http_code" != "200" ]; then
        log "ERROR: Key Vault returned HTTP ${kv_http_code}. Does secret '${GITHUB_PAT_SECRET_NAME}' exist?"
        log "Response: $kv_body"
        exit 1
      fi

      if [ -z "$github_pat" ] || [ "$github_pat" = "null" ]; then
        log "ERROR: GitHub PAT value is empty or null."
        exit 1
      fi
      log "GitHub PAT retrieved."

      log "Requesting runner registration token from GitHub..."
      reg_response=$(curl -sSL -w "\n%{http_code}" -X POST \
        -H "Authorization: token ${github_pat}" \
        -H "Accept: application/vnd.github+json" \
        "${REGISTRATION_TOKEN_API_URL}")
      reg_http_code=$(echo "$reg_response" | tail -1)
      reg_body=$(echo "$reg_response" | sed '$d')
      registration_token=$(echo "$reg_body" | jq -r '.token')

      if [ "$reg_http_code" != "201" ]; then
        log "ERROR: GitHub API returned HTTP ${reg_http_code}. Check PAT scopes (needs admin:org)."
        log "Response: $reg_body"
        exit 1
      fi

      if [ -z "$registration_token" ] || [ "$registration_token" = "null" ]; then
        log "ERROR: Registration token is empty or null."
        exit 1
      fi
      log "Registration token acquired."

      rm -f \
        "$RUNNER_HOME/.runner" \
        "$RUNNER_HOME/.credentials" \
        "$RUNNER_HOME/.credentials_rsaparams" \
        "$RUNNER_HOME/.env"

      log "Configuring runner (group=${RUNNER_GROUP}, labels=${RUNNER_LABELS})..."
      su - runner -c "cd \"$RUNNER_HOME\" && ./config.sh --url \"$GITHUB_URL\" --token \"$registration_token\" --runnergroup \"$RUNNER_GROUP\" --labels \"$RUNNER_LABELS\" --name \"vmss-$(hostname)\" --work _work --unattended --ephemeral --replace"
      log "Runner configured. Starting run.sh..."
      exec su - runner -c "cd \"$RUNNER_HOME\" && ./run.sh"

  - path: /etc/systemd/system/github-runner.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=GitHub Actions VMSS runner
      Wants=network-online.target docker.service
      After=network-online.target docker.service

      [Service]
      Type=simple
      ExecStart=/opt/github-runner/start-runner.sh
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

runcmd:
  - systemctl enable --now docker
  - systemctl daemon-reload
  - systemctl enable --now github-runner.service
